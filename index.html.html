<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتائج التصويت</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: #0f1117;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .bg-glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.15;
    pointer-events: none;
  }
  .bg-glow-1 { background: #3b82f6; top: -100px; right: -100px; }
  .bg-glow-2 { background: #ef4444; bottom: -100px; left: -100px; }

  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 28px;
    padding: 48px;
    width: 420px;
    backdrop-filter: blur(20px);
    box-shadow: 0 32px 80px rgba(0,0,0,0.4);
    position: relative;
    animation: fadeUp 0.8s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .title {
    color: #fff;
    font-size: 26px;
    font-weight: 900;
    text-align: center;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }

  .subtitle {
    color: rgba(255,255,255,0.35);
    font-size: 13px;
    text-align: center;
    margin-bottom: 40px;
  }

  /* Donut Chart */
  .chart-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 36px;
    position: relative;
  }

  svg.donut { overflow: visible; }

  .donut-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .donut-center .total-num {
    font-size: 36px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
  }
  .donut-center .total-label {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    margin-top: 2px;
  }

  /* Bars */
  .bars { display: flex; flex-direction: column; gap: 16px; }

  .bar-row { }
  .bar-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .bar-label {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .bar-pct {
    font-size: 18px;
    font-weight: 900;
    color: #fff;
  }
  .bar-track {
    background: rgba(255,255,255,0.07);
    border-radius: 99px;
    height: 10px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 99px;
    width: 0%;
    transition: width 1.2s cubic-bezier(.16,1,.3,1);
  }

  .divider {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.07);
    margin: 28px 0;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-label { color: rgba(255,255,255,0.3); font-size: 12px; }
  .refresh-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6);
    font-family: 'Tajawal', sans-serif;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .refresh-btn:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }
  .refresh-btn svg { transition: transform 0.4s; }
  .refresh-btn:hover svg { transform: rotate(180deg); }

  .vote-topic {
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 6px;
    line-height: 1.5;
  }
    text-align: center;
    color: rgba(255,255,255,0.4);
    font-size: 14px;
    padding: 20px 0;
  }

  .error-msg {
    text-align: center;
    color: #ef4444;
    font-size: 13px;
    padding: 10px 0;
  }
</style>
</head>
<body>

<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>

<div class="card">
  <div class="title">نتائج التصويت</div>
  <div class="vote-topic">إغلاق رصيد مشروع فندق تبوك وفق المعالجة المحاسبية المعتمدة للقوائم المالية لعام 2025م</div>
  <div class="subtitle" id="lastUpdate">جارٍ التحميل...</div>

  <div class="chart-wrap">
    <svg class="donut" width="180" height="180" viewBox="0 0 180 180">
      <circle cx="90" cy="90" r="70" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="22"/>
      <circle id="arc-yes" cx="90" cy="90" r="70" fill="none"
        stroke="#3b82f6" stroke-width="22"
        stroke-dasharray="0 440"
        stroke-dashoffset="110"
        stroke-linecap="round"
        style="transition: stroke-dasharray 1.2s cubic-bezier(.16,1,.3,1); transform-origin:center; transform:rotate(-90deg)"/>
      <circle id="arc-no" cx="90" cy="90" r="70" fill="none"
        stroke="#ef4444" stroke-width="22"
        stroke-dasharray="0 440"
        stroke-dashoffset="110"
        stroke-linecap="round"
        style="transition: stroke-dasharray 1.2s cubic-bezier(.16,1,.3,1) 0.1s; transform-origin:center; transform:rotate(-90deg)"/>
    </svg>
    <div class="donut-center">
      <div class="total-num" id="totalNum">-</div>
      <div class="total-label">إجمالي الأصوات</div>
    </div>
  </div>

  <div class="bars">
    <div class="bar-row">
      <div class="bar-meta">
        <div class="bar-label">
          <div class="dot" style="background:#3b82f6"></div>
          أوافق
        </div>
        <div class="bar-pct" id="pct-yes">-</div>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="bar-yes" style="background:linear-gradient(90deg,#2563eb,#60a5fa)"></div>
      </div>
    </div>
    <div class="bar-row">
      <div class="bar-meta">
        <div class="bar-label">
          <div class="dot" style="background:#ef4444"></div>
          لا أوافق
        </div>
        <div class="bar-pct" id="pct-no">-</div>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="bar-no" style="background:linear-gradient(90deg,#dc2626,#f87171)"></div>
      </div>
    </div>
  </div>

  <hr class="divider">

  <div class="footer">
    <span class="footer-label" id="responseCount">-</span>
    <button class="refresh-btn" onclick="loadData()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5M21 12a9 9 0 0 1-15 6.7L3 16M3 21v-5h5"/>
      </svg>
      تحديث
    </button>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwm9EJoVWrCYqepXjH9jiIthFhv5M23Ni1pAAV_HzcSR7yIyJOrFjh1B8NIbtcOr8d1/exec";
const CIRC = 2 * Math.PI * 70; // 439.8

async function loadData() {
  document.getElementById('lastUpdate').textContent = 'جارٍ التحميل...';
  try {
    const res = await fetch(API_URL + '?t=' + Date.now());
    const data = await res.json();
    const yes = data.yes;
    const no = data.no;
    const total = data.total;
    if (total === 0) {
      document.getElementById('lastUpdate').textContent = 'لا توجد أصوات بعد';
      return;
    }

    const yesPct = Math.round((yes / total) * 100);
    const noPct = 100 - yesPct;

    // Update numbers
    document.getElementById('totalNum').textContent = total;
    document.getElementById('pct-yes').textContent = yesPct + '%';
    document.getElementById('pct-no').textContent = noPct + '%';
    document.getElementById('responseCount').textContent = total + ' صوت';

    // Animate bars
    setTimeout(() => {
      document.getElementById('bar-yes').style.width = yesPct + '%';
      document.getElementById('bar-no').style.width = noPct + '%';
    }, 100);

    // Animate donut
    const yesLen = (yesPct / 100) * CIRC;
    const noLen  = (noPct  / 100) * CIRC;
    const gap = 6;

    setTimeout(() => {
      document.getElementById('arc-yes').setAttribute('stroke-dasharray', `${yesLen - gap} ${CIRC - yesLen + gap}`);
      document.getElementById('arc-no').setAttribute('stroke-dasharray', `${noLen - gap} ${CIRC - noLen + gap}`);
      document.getElementById('arc-no').setAttribute('stroke-dashoffset', `${-(yesLen - gap) + 110}`);
    }, 200);

    const now = new Date();
    document.getElementById('lastUpdate').textContent =
      'آخر تحديث: ' + now.toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'});

  } catch(e) {
    document.getElementById('lastUpdate').textContent = 'تعذّر تحميل البيانات';
  }
}

loadData();
setInterval(loadData, 30000); // auto-refresh every 30s
</script>
</body>
</html>
