<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتائج التصويت</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Tajawal', sans-serif;
    background: #faf0f3;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .bg-glow { position:fixed; width:500px; height:500px; border-radius:50%; filter:blur(100px); opacity:0.12; pointer-events:none; }
  .bg-glow-1 { background:#4D1A80; top:-80px; right:-80px; }
  .bg-glow-2 { background:#CC0033; bottom:-80px; left:-80px; }
  .card {
    background: rgba(77,26,128,0.05);
    border: 1px solid rgba(77,26,128,0.15);
    border-radius: 28px;
    padding: 48px;
    width: 440px;
    backdrop-filter: blur(20px);
    box-shadow: 0 32px 80px rgba(77,26,128,0.1);
    animation: fadeUp 0.8s ease forwards;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
  .title { color:#2a0040; font-size:26px; font-weight:900; text-align:center; margin-bottom:8px; }
  .vote-topic { color:#4D1A80; font-size:14px; font-weight:700; text-align:center; margin-bottom:8px; line-height:1.6; }
  .subtitle { color:#666; font-size:12px; text-align:center; margin-bottom:36px; }
  .chart-wrap { display:flex; justify-content:center; margin-bottom:36px; position:relative; }
  .donut-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; }
  .donut-center .total-num { font-size:36px; font-weight:900; color:#2a0040; line-height:1; }
  .donut-center .total-label { font-size:11px; color:#666; margin-top:2px; }
  .bars { display:flex; flex-direction:column; gap:16px; }
  .bar-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .bar-label { display:flex; align-items:center; gap:8px; color:#222; font-size:15px; font-weight:700; }
  .dot { width:10px; height:10px; border-radius:50%; }
  .bar-pct { font-size:18px; font-weight:900; color:#2a0040; }
  .bar-track { background:rgba(77,26,128,0.08); border-radius:99px; height:10px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:99px; width:0%; transition:width 1.2s cubic-bezier(.16,1,.3,1); }
  .divider { border:none; border-top:1px solid rgba(77,26,128,0.12); margin:28px 0; }
  .footer { display:flex; justify-content:space-between; align-items:center; }
  .footer-label { color:#999; font-size:12px; }
  .refresh-btn {
    background:rgba(77,26,128,0.07); border:1px solid rgba(77,26,128,0.18);
    color:#4D1A80; font-family:'Tajawal',sans-serif; font-size:12px;
    padding:6px 14px; border-radius:99px; cursor:pointer; transition:all 0.2s;
    display:flex; align-items:center; gap:6px; font-weight:700;
  }
  .refresh-btn:hover { opacity:0.8; }
  .refresh-btn svg { transition:transform 0.4s; }
  .refresh-btn:hover svg { transform:rotate(180deg); }
</style>
</head>
<body>
<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>
<div class="card">
  <div class="title">نتائج التصويت</div>
  <div class="vote-topic">تقرير مراجع الحسابات عن السنة المالية المنتهية بتاريخ 2025/12/31م</div>
  <div class="subtitle" id="lastUpdate">جارٍ التحميل...</div>
  <div class="chart-wrap">
    <svg width="180" height="180" viewBox="0 0 180 180">
      <circle cx="90" cy="90" r="70" fill="none" stroke="rgba(77,26,128,0.08)" stroke-width="22"/>
      <circle id="arc-yes" cx="90" cy="90" r="70" fill="none" stroke="#4D1A80" stroke-width="22"
        stroke-dasharray="0 440" stroke-dashoffset="110" stroke-linecap="round"
        style="transition:stroke-dasharray 1.2s cubic-bezier(.16,1,.3,1);transform-origin:center;transform:rotate(-90deg)"/>
      <circle id="arc-no" cx="90" cy="90" r="70" fill="none" stroke="#CC0033" stroke-width="22"
        stroke-dasharray="0 440" stroke-dashoffset="110" stroke-linecap="round"
        style="transition:stroke-dasharray 1.2s cubic-bezier(.16,1,.3,1) 0.1s;transform-origin:center;transform:rotate(-90deg)"/>
    </svg>
    <div class="donut-center">
      <div class="total-num" id="totalNum">-</div>
      <div class="total-label">إجمالي الأصوات</div>
    </div>
  </div>
  <div class="bars">
    <div class="bar-row">
      <div class="bar-meta">
        <div class="bar-label"><div class="dot" style="background:#4D1A80"></div>أوافق</div>
        <div class="bar-pct" id="pct-yes">-</div>
      </div>
      <div class="bar-track"><div class="bar-fill" id="bar-yes" style="background:linear-gradient(90deg,#330d55,#6b25b3)"></div></div>
    </div>
    <div class="bar-row">
      <div class="bar-meta">
        <div class="bar-label"><div class="dot" style="background:#CC0033"></div>لا أوافق</div>
        <div class="bar-pct" id="pct-no">-</div>
      </div>
      <div class="bar-track"><div class="bar-fill" id="bar-no" style="background:linear-gradient(90deg,#8c0022,#ff0040)"></div></div>
    </div>
  </div>
  <hr class="divider">
  <div class="footer">
    <span class="footer-label" id="responseCount">-</span>
    <button class="refresh-btn" onclick="loadData()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5M21 12a9 9 0 0 1-15 6.7L3 16M3 21v-5h5"/>
      </svg>
      تحديث
    </button>
  </div>
</div>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx6EgHZgms15YASmtRZeKPj5HoVNdk_xB2WylTxZjOWjZL62Awt4cpSk0NkJZf3GLMS/exec?sheet=1WnWSv5np60c_kof2yqGD4az2sMyn-RTso5HnLZbW3ME";
const CIRC = 2 * Math.PI * 70;
async function loadData() {
  document.getElementById('lastUpdate').textContent = 'جارٍ التحميل...';
  try {
    const sep = API_URL.includes('?') ? '&' : '?';
    const res = await fetch(API_URL + sep + 't=' + Date.now());
    const data = await res.json();
    const yes = data.yes, no = data.no, total = data.total;
    if (total === 0) { document.getElementById('lastUpdate').textContent = 'لا توجد أصوات بعد'; return; }
    const yesPct = Math.round((yes / total) * 100);
    const noPct = 100 - yesPct;
    document.getElementById('totalNum').textContent = total;
    document.getElementById('pct-yes').textContent = yesPct + '%';
    document.getElementById('pct-no').textContent = noPct + '%';
    document.getElementById('responseCount').textContent = total + ' صوت';
    setTimeout(() => {
      document.getElementById('bar-yes').style.width = yesPct + '%';
      document.getElementById('bar-no').style.width = noPct + '%';
    }, 100);
    const yesLen = (yesPct/100)*CIRC, noLen = (noPct/100)*CIRC, gap = 6;
    setTimeout(() => {
      document.getElementById('arc-yes').setAttribute('stroke-dasharray', `${yesLen-gap} ${CIRC-yesLen+gap}`);
      document.getElementById('arc-no').setAttribute('stroke-dasharray', `${noLen-gap} ${CIRC-noLen+gap}`);
      document.getElementById('arc-no').setAttribute('stroke-dashoffset', `${-(yesLen-gap)+110}`);
    }, 200);
    const now = new Date();
    document.getElementById('lastUpdate').textContent = 'آخر تحديث: ' + now.toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'});
  } catch(e) {
    document.getElementById('lastUpdate').textContent = 'تعذّر تحميل البيانات';
  }
}
loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
